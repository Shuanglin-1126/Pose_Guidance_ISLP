stage_1:
  target: src.stage1.RAE
  params:
    encoder_cls: 'Dinov2withNorm'
    encoder_config_path: '\checkpoint\RAE-collections\encoder\dinov2\vit_b'
    encoder_input_size: 224
    encoder_params:
      dinov2_path: '\checkpoint\RAE-collections\encoder\dinov2\vit_b'
      normalize: true
    decoder_config_path: '\configs\decoder\ViTXL'
    pretrained_decoder_path: '\checkpoint\RAE-collections\decoders\dinov2\wReg_base\ViTXL_n08\model.pt'
    noise_tau: 0.8
    reshape_to_2d: true
#    normalization_stat_path: '\RAE\checkpoint\RAE-collections\stats\dinov2\wReg_base\imagenet1k\stat.pt'

training:
  epochs: 3
  ema_decay: 0.9978
  batch_size: 8 # per-proc bs
  num_workers: 8
  clip_grad: 0.0
  log_interval: 100
  checkpoint_epoch: 1
  sample_epoch: 1
  optimizer:
    lr: 1.0e-4
    betas: [0.9, 0.95]
    weight_decay: 0.0
  scheduler:
    type: cosine
    warmup_epochs: 0.4
    decay_end_epoch: 2.8
    base_lr: 1.0e-4
    final_lr: 1.0e-5

gan:
  disc:
    arch:
      dino_ckpt_path: '\RAE\checkpoint\RAE-collections\discs\dino_vit_small_patch8_224.pth'
      ks: 9
      norm_type: 'bn'
      using_spec_norm: true
      recipe: 'S_8'
    optimizer:
      lr: 1.0e-4
      betas: [0.9, 0.95]
      weight_decay: 0.0
    scheduler:
      type: cosine
      warmup_epochs: 0.4
      decay_end_epoch: 2.8
      base_lr: 1.0e-4
      final_lr: 1.0e-5
    augment:
      prob: 1.0
      cutout: 0.0
  loss:
    disc_loss: hinge
    gen_loss: vanilla
    disc_weight: 0.0
    perceptual_weight: 1.0
    disc_start: 1.8
    disc_upd_start: 3
    lpips_start: 0
    max_d_weight: 10000.0
    disc_updates: 1